# ---------------------------------------
# THEME
# ---------------------------------------
remote_theme          : "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin : "dark"   # custom.scss overrides colours

# ---------------------------------------
# SITE INFO
# ---------------------------------------
title       : "Mihir Thakkar"
subtitle    : "AI Governance • Distributed Compute • Datathons"
description : "Founder & CEO, Ostrich AI | Global AI Delegate — India (GAFAI) | Global Ambassador — India (RAGN) | Indian Patent #567234"
url         : "https://mihir-ai-lab.github.io"
baseurl     : ""                                # no trailing slash
repository  : "mihir-ai-lab/mihir-ai-lab.github.io"
logo        : "/assets/images/mihir.png"

# ---------------------------------------
# SOCIAL HANDLES (for SEO cards only)
# ---------------------------------------
twitter:
  username : "0xmthakkar"

social:
  type : "Person"
  name : "Mihir Thakkar"
  links:
    - "https://linkedin.com/in/thakkarmihir"
    - "https://github.com/mihir-ai-lab"
    - "https://twitter.com/0xmthakkar"
    - "https://ostrich-ai.com"

# ---------------------------------------
# AUTHOR CARD  (shows when author_profile: true)
# ---------------------------------------
author:
  name   : "Mihir Thakkar"
  avatar : "/assets/images/mihirt.png"
  bio    : >
    Founder & CEO, Ostrich AI<br>
    Indian Patent #567234<br>
    Global AI Delegate — India (GAFAI)<br>
    Global Ambassador — India (RAGN)
  links:
    - label: "LinkedIn"
      icon : "fab fa-fw fa-linkedin"
      url  : "https://linkedin.com/in/thakkarmihir"
    - label: "Website"
      icon : "fas fa-fw fa-globe"
      url  : "https://ostrich-ai.com"
    - label: "GitHub"
      icon : "fab fa-fw fa-github"
      url  : "https://github.com/mihir-ai-lab"
    - label: "X"
      icon : "fab fa-fw fa-x-twitter"
      url  : "https://twitter.com/0xmthakkar"

# ---------------------------------------
# FOOTER SOCIAL LINKS (icons only)
# ---------------------------------------
footer:
  links:
    - label: "in"
      icon : "fab fa-fw fa-linkedin"
      url  : "https://linkedin.com/in/thakkarmihir"
    - label: "gh"
      icon : "fab fa-fw fa-github"
      url  : "https://github.com/mihir-ai-lab"
    - label: "x"
      icon : "fab fa-fw fa-x-twitter"
      url  : "https://twitter.com/0xmthakkar"
    - label: "web"
      icon : "fas fa-fw fa-globe"
      url  : "https://ostrich-ai.com"

# ---------------------------------------
# BUILD / ASSETS
# ---------------------------------------
exclude:
  - test
  - docs
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock

sass:
  sass_dir  : _sass
  style     : compressed
  load_paths:
    - assets/css          # custom.scss lives here

plugins:
  - jekyll-include-cache  # GitHub Pages auto-adds the rest

# ---------------------------------------
# ✅ GOOGLE ANALYTICS (gtag.js)
# ---------------------------------------
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-7RRYRVL5KM"
